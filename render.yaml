services:
  - type: web
    name: taiwan-stock-project
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --chdir web app:app --workers 1 --threads 4 --timeout 120"
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: SESSION_MAX_HOURS
        value: "6"
      - key: STOCK_DB_PATH
        value: "stock_system.db"